<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  body {
    font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    margin: 0;
    padding: 16px;
    color: #1a1a1a;
  }
  p {
    font-size: 12px;
    line-height: 1.5;
    color: #555;
    margin: 0 0 12px 0;
  }
  label.checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #1a1a1a;
    margin-bottom: 12px;
    cursor: pointer;
  }
  label.checkbox input {
    margin: 0;
  }
  button {
    width: 100%;
    padding: 10px 12px;
    background: #18a0fb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover {
    background: #0d8ee0;
  }
  button:disabled {
    background: #b8dffb;
    cursor: default;
  }
  button.secondary {
    margin-top: 8px;
    background: transparent;
    color: #555;
    font-weight: 400;
  }
  button.secondary:hover {
    background: #f0f0f0;
  }
  #results h3 {
    font-size: 13px;
    margin: 0 0 10px 0;
  }
  #results ul {
    list-style: none;
    margin: 0 0 16px 0;
    padding: 0;
    font-size: 12px;
  }
  #results li {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }
  #results li span:last-child {
    font-weight: 600;
  }
  .hidden {
    display: none;
  }
  #notice {
    font-size: 12px;
    color: #d13438;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div id="main">
    <p>
      Select one or more text layers (or a frame containing them), then run.
      Overflowing fixed-size text boxes will be flagged with a signal color.
    </p>
    <label class="checkbox">
      <input type="checkbox" id="rtlToggle" />
      Include RTL test characters (Arabic + Hebrew)
    </label>
    <label class="checkbox">
      <input type="checkbox" id="summaryToggle" checked />
      Show run summary when done
    </label>
    <button id="run">Pseudolocalize Selection</button>
    <button id="cancel" class="secondary">Cancel</button>
  </div>

  <div id="results" class="hidden">
    <div id="notice"></div>
    <h3>Run summary</h3>
    <ul id="statsList"></ul>
    <button id="close">Close</button>
  </div>

  <script>
    const mainView = document.getElementById("main");
    const resultsView = document.getElementById("results");
    const statsList = document.getElementById("statsList");
    const noticeEl = document.getElementById("notice");
    const runBtn = document.getElementById("run");

    document.getElementById("run").onclick = () => {
      runBtn.disabled = true;
      runBtn.textContent = "Running…";
      const includeRTL = document.getElementById("rtlToggle").checked;
      const showSummary = document.getElementById("summaryToggle").checked;
      parent.postMessage(
        { pluginMessage: { type: "run", includeRTL: includeRTL, showSummary: showSummary } },
        "*"
      );
    };

    document.getElementById("cancel").onclick = () => {
      parent.postMessage({ pluginMessage: { type: "close" } }, "*");
    };

    document.getElementById("close").onclick = () => {
      parent.postMessage({ pluginMessage: { type: "close" } }, "*");
    };

    const STAT_LABELS = {
      processed: "Strings pseudolocalized",
      overflowed: "Containers overrun",
      placeholdersProtected: "Placeholder tokens protected",
      skippedLocked: "Locked / hidden layers skipped",
      skippedAutoSized: "Auto-sized layers (not checked for overflow)",
      skippedEmpty: "Empty text layers skipped",
      fontIssues: "Font-load fallbacks",
      errors: "Errors",
      avgExpansionPct: "Average length growth"
    };

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg || msg.type !== "results") return;

      mainView.classList.add("hidden");
      resultsView.classList.remove("hidden");

      if (msg.notice) {
        noticeEl.textContent = msg.notice;
        noticeEl.classList.remove("hidden");
      } else {
        noticeEl.classList.add("hidden");
      }

      statsList.innerHTML = "";
      if (msg.stats) {
        Object.keys(STAT_LABELS).forEach((key) => {
          const li = document.createElement("li");
          const labelSpan = document.createElement("span");
          const valueSpan = document.createElement("span");
          labelSpan.textContent = STAT_LABELS[key];
          const raw = msg.stats[key];
          valueSpan.textContent = key === "avgExpansionPct" ? raw + "%" : raw;
          li.appendChild(labelSpan);
          li.appendChild(valueSpan);
          statsList.appendChild(li);
        });
      }

      // Resize the plugin window to fit the actual rendered content, so the
      // summary never needs to scroll regardless of how many stat rows or
      // how long the notice text ends up being.
      requestAnimationFrame(() => {
        const neededHeight = Math.ceil(document.body.scrollHeight) + 4;
        parent.postMessage(
          { pluginMessage: { type: "resize", width: 320, height: Math.max(neededHeight, 160) } },
          "*"
        );
      });
    };
  </script>
</body>
</html>
